<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer's Happy World</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#FFF0F5;min-height:100vh}
.hero{background:#FFF0F5;border-bottom:1px solid #FFD6E7;padding:1.5rem 1.5rem 1rem;text-align:center;position:relative;overflow:hidden}
.hero-deco{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden}
.hero-deco span{position:absolute;opacity:0.15;animation:float 6s ease-in-out infinite}
.hero-name{font-size:58px;font-weight:700;color:#C43060;letter-spacing:-2px;line-height:1;margin-bottom:4px}
.hero-sub{font-size:13px;color:#993556;letter-spacing:.14em;text-transform:uppercase;margin-bottom:1rem}
.stars-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:.5rem}
.star-count{font-size:26px;font-weight:700;color:#E8A020}
.level-wrap{background:#FFD6E7;border-radius:20px;height:8px;width:200px;margin:0 auto}
.level-fill{background:#E8527A;border-radius:20px;height:8px;transition:width .6s}
.level-txt{font-size:11px;color:#993556;margin-top:5px}
.nav{display:flex;background:#FFF0F5;border-bottom:1px solid #FFD6E7;padding:0 1.5rem;overflow-x:auto}
.nb{padding:11px 15px;font-size:13px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;color:#993556;cursor:pointer;white-space:nowrap}
.nb.on{color:#C43060;border-bottom-color:#C43060}
.pg{padding:1.25rem 1.5rem;max-width:720px;margin:0 auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:white;border:1.5px solid #FFD6E7;border-radius:16px;padding:1.1rem;cursor:pointer}
.card:hover{border-color:#E8527A;background:#FFF0F5}
.card-icon{font-size:24px;color:#E8527A;margin-bottom:8px;display:block}
.card-title{font-size:14px;font-weight:600;color:#3D0D1E;margin-bottom:4px}
.card-desc{font-size:12px;color:#993556;line-height:1.5}
.qbox{background:white;border:1.5px solid #FFD6E7;border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.qtag{font-size:11px;background:#FFD6E7;color:#7A1A3A;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px;font-weight:600}
.qtxt{font-size:15px;font-weight:600;color:#3D0D1E;line-height:1.55}
.qhint{font-size:12px;color:#993556;margin-top:8px;font-style:italic;line-height:1.5}
.stoic{background:#FFD6E7;border-left:3px solid #E8527A;border-radius:0 12px 12px 0;padding:1rem 1.25rem;margin:10px 0}
.sq{font-size:13px;color:#3D0D1E;font-style:italic;line-height:1.65;margin-bottom:4px}
.se{font-size:12px;color:#7A1A3A;line-height:1.6}
.fu{background:#FFF0F5;border:1px solid #FFB3CE;border-radius:10px;padding:8px 12px;margin-top:8px;font-size:13px;color:#7A1A3A}
.ans{width:100%;min-height:100px;padding:12px;border:1.5px solid #FFB3CE;border-radius:12px;font-size:14px;font-family:inherit;color:#3D0D1E;background:white;resize:vertical;line-height:1.65}
.ans:focus{outline:none;border-color:#E8527A}
.clk{display:flex;align-items:center;justify-content:space-between;background:white;border:1.5px solid #FFD6E7;border-radius:12px;padding:10px 16px;margin-bottom:10px}
.clk-num{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;color:#3D0D1E}
.clk-num.warn{color:#E8A020}
.clk-num.danger{color:#C43060}
.clk-lbl{font-size:11px;color:#993556;margin-bottom:2px}
.btn{padding:10px 20px;background:#E8527A;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#C43060}
.btn2{padding:9px 16px;background:white;color:#993556;border:1.5px solid #FFB3CE;border-radius:10px;font-size:13px;cursor:pointer}
.sbars{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.sb{background:#FFF0F5;border-radius:8px;padding:8px 10px}
.sb-l{font-size:11px;color:#993556;margin-bottom:3px}
.sb-v{font-size:16px;font-weight:700;color:#3D0D1E}
.sb-t{height:3px;background:#FFD6E7;border-radius:2px;margin-top:4px}
.sb-f{height:3px;border-radius:2px;background:#E8527A}
.fb{background:#FFF0F5;border-radius:10px;padding:10px 14px;margin-bottom:8px}
.fb-l{font-size:10px;font-weight:700;color:#993556;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.fb-t{font-size:13px;color:#3D0D1E;line-height:1.65}
.fb.g{background:#F0FDF4;border-left:3px solid #1D9E75;border-radius:0 10px 10px 0}
.fb.w{background:#FFFBEB;border-left:3px solid #E8A020;border-radius:0 10px 10px 0}
.fb.p{background:#FFD6E7;border-left:3px solid #E8527A;border-radius:0 10px 10px 0}
.pop-box{background:white;border:2px solid #E8527A;border-radius:20px;padding:1.5rem;text-align:center;margin:1rem 0}
.pop-stars{font-size:36px;color:#E8A020;margin-bottom:8px;letter-spacing:4px}
.pop-title{font-size:20px;font-weight:700;color:#C43060;margin-bottom:6px}
.pop-msg{font-size:13px;color:#993556;line-height:1.6}
.bdg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.bdg{background:white;border:1.5px solid #FFD6E7;border-radius:12px;padding:12px 8px;text-align:center}
.bdg-icon{font-size:24px;margin-bottom:6px;color:#E8527A;display:block}
.bdg-name{font-size:11px;color:#993556;font-weight:700;margin-bottom:2px}
.bdg-desc{font-size:10px;color:#C43060}
.bdg.locked{opacity:0.35;filter:grayscale(1)}
.prog-num{font-size:13px;color:#993556;text-align:center;margin-bottom:1rem;font-weight:600}
.ld{display:flex;align-items:center;gap:10px;color:#993556;font-size:14px;padding:2rem 0}
.d{width:8px;height:8px;border-radius:50%;background:#E8527A;animation:bounce 1s infinite;display:inline-block}
.d:nth-child(2){animation-delay:.15s}
.d:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(0.8);opacity:0.5}40%{transform:scale(1.2);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pop{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.anim{animation:pop .4s ease-out forwards}
.hide{display:none!important}
.row{display:flex;gap:8px;align-items:center}
.f1{flex:1}
hr{border:none;border-top:1px solid #FFD6E7;margin:.75rem 0}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-deco" id="deco"></div>
  <div class="hero-name">Summer</div>
  <div class="hero-sub">Summer's Happy World</div>
  <div class="stars-row">
    <i class="ti ti-star" style="color:#E8A020;font-size:22px"></i>
    <span class="star-count" id="sc">0</span>
    <span style="font-size:13px;color:#993556">stars earned</span>
  </div>
  <div class="level-wrap"><div class="level-fill" id="lf" style="width:0%"></div></div>
  <div class="level-txt" id="lt">Level 1 - Curious Thinker</div>
</div>
<div class="nav">
  <button class="nb on" onclick="go('practice')"><i class="ti ti-sparkles"></i> Practice</button>
  <button class="nb" onclick="go('badges')"><i class="ti ti-medal"></i> Badges</button>
  <button class="nb" onclick="go('progress')"><i class="ti ti-chart-bar"></i> Progress</button>
</div>
<div class="pg">

<div id="t-practice">
  <div id="sv">
    <div class="grid2">
      <div class="card" onclick="startQ('interview')"><i class="ti ti-microphone card-icon"></i><div class="card-title">Interview</div><div class="card-desc">Deep questions with Stoic wisdom. 5 min each.</div></div>
      <div class="card" onclick="startQ('dilemma')"><i class="ti ti-scale card-icon"></i><div class="card-title">Moral dilemma</div><div class="card-desc">No easy answers. Pick a side and defend it.</div></div>
    </div>
    <div class="card" onclick="startQ('rapid')" style="padding:1rem 1.25rem;display:flex;align-items:center;gap:14px">
      <i class="ti ti-bolt" style="font-size:24px;color:#E8527A;flex-shrink:0"></i>
      <div><div class="card-title">Rapid fire</div><div class="card-desc">Quick questions. 90 seconds each.</div></div>
    </div>
  </div>

  <div id="qv" class="hide">
    <div class="clk">
      <div><div class="clk-lbl" id="clbl">Time remaining</div><div class="clk-num" id="cnum">5:00</div></div>
      <div class="row">
        <button class="btn2" onclick="pause()" id="pbtn"><i class="ti ti-player-pause"></i></button>
        <button class="btn2" onclick="nextQ()"><i class="ti ti-arrow-right"></i> Skip</button>
      </div>
    </div>
    <div class="prog-num" id="qprog">Question 1</div>
    <div id="qarea"><div class="ld"><div class="d"></div><div class="d"></div><div class="d"></div><span>Getting your question...</span></div></div>
    <div id="aw" class="hide">
      <textarea class="ans" id="ain" placeholder="Take a breath. Then answer honestly - not perfectly..."></textarea>
      <div style="margin-top:10px" class="row">
        <button class="btn f1" onclick="submitAns()"><i class="ti ti-send"></i> Submit my answer</button>
      </div>
    </div>
    <div id="fba" class="hide"></div>
  </div>
</div>

<div id="t-badges" class="hide"><div class="bdg-grid" id="bg"></div></div>
<div id="t-progress" class="hide"><div id="pc"></div></div>

</div>
<script>
var DC=['*','o','~'];
var de=document.getElementById('deco');
for(var i=0;i<20;i++){var sp=document.createElement('span');sp.textContent=DC[i%DC.length];sp.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-delay:'+Math.random()*4+'s;font-size:'+(10+Math.random()*14)+'px';de.appendChild(sp);}

var LV=[{min:0,max:19,n:'Curious Thinker'},{min:20,max:49,n:'Deep Wonderer'},{min:50,max:89,n:'Brave Questioner'},{min:90,max:139,n:'Wise Listener'},{min:140,max:199,n:'Honest Heart'},{min:200,max:9999,n:'Luminous Mind'}];
var BDG=[{id:'first',icon:'ti-message',name:'First words',desc:'Answered first question'},{id:'honest',icon:'ti-heart',name:'Honest heart',desc:'Scored 8+ on honesty'},{id:'deep',icon:'ti-brain',name:'Deep thinker',desc:'Scored 9+ overall'},{id:'five',icon:'ti-star',name:'Five strong',desc:'Completed 5 questions'},{id:'ten',icon:'ti-crown',name:'Ten champion',desc:'Completed 10 questions'},{id:'dilemma',icon:'ti-scale',name:'Moral courage',desc:'Faced a moral dilemma'},{id:'rapid',icon:'ti-bolt',name:'Quick thinker',desc:'Completed rapid fire'},{id:'lum',icon:'ti-sparkles',name:'Luminous mind',desc:'Reached Level 6'}];

async function api(sys, usr) {
  var r = await fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({system: sys, user: usr, max_tokens: 800})
  });
  var d = await r.json();
  if (!r.ok || d.error) throw new Error((d.error && d.error.message) ? d.error.message : 'API error');
  var txt = Array.isArray(d.content) ? d.content.map(function(b){return b.text||'';}).join('') : '';
  return txt;
}

var stars=parseInt(localStorage.getItem('ss')||'0');
var cnt=parseInt(localStorage.getItem('sc')||'0');
var bdgs=JSON.parse(localStorage.getItem('sb')||'[]');
var hist=JSON.parse(localStorage.getItem('sh')||'[]');
var stype='interview';
var qnum=0;
var cs=300,cr=false,ci=null;
var currentQ=null;

function save(){localStorage.setItem('ss',stars);localStorage.setItem('sc',cnt);localStorage.setItem('sb',JSON.stringify(bdgs));localStorage.setItem('sh',JSON.stringify(hist.slice(-30)));}
function uh(){document.getElementById('sc').textContent=stars;var lv=LV.find(function(l){return stars>=l.min&&stars<=l.max;})||LV[LV.length-1];var li=LV.indexOf(lv);document.getElementById('lf').style.width=Math.round(Math.min(100,(stars-lv.min)/(lv.max-lv.min+1)*100))+'%';document.getElementById('lt').textContent='Level '+(li+1)+' - '+lv.n;if(li===5)ab('lum');}
uh();
function as(n){stars+=n;uh();save();}
function ab(id){if(bdgs.includes(id))return;bdgs.push(id);save();}
function go(t){['practice','badges','progress'].forEach(function(x){document.getElementById('t-'+x).classList.add('hide');});document.getElementById('t-'+t).classList.remove('hide');document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});['practice','badges','progress'].forEach(function(x,i){if(x===t)document.querySelectorAll('.nb')[i].classList.add('on');});if(t==='badges')rb();if(t==='progress')rp();}
function rb(){document.getElementById('bg').innerHTML=BDG.map(function(b){return '<div class="bdg'+(bdgs.includes(b.id)?'':' locked')+'"><i class="ti '+b.icon+' bdg-icon"></i><div class="bdg-name">'+b.name+'</div><div class="bdg-desc">'+(bdgs.includes(b.id)?b.desc:'???')+'</div></div>';}).join('');}
function rp(){document.getElementById('pc').innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem"><div style="background:white;border:1.5px solid #FFD6E7;border-radius:10px;padding:12px;text-align:center"><div style="font-size:11px;color:#993556;margin-bottom:3px">Stars</div><div style="font-size:28px;font-weight:700;color:#C43060">'+stars+'</div></div><div style="background:white;border:1.5px solid #FFD6E7;border-radius:10px;padding:12px;text-align:center"><div style="font-size:11px;color:#993556;margin-bottom:3px">Questions</div><div style="font-size:28px;font-weight:700;color:#C43060">'+cnt+'</div></div></div>'+(hist.length===0?'<div style="text-align:center;color:#993556;padding:2rem 0">Answer questions to see your progress!</div>':hist.slice(-8).reverse().map(function(s){return '<div style="background:white;border:1.5px solid #FFD6E7;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:13px;font-weight:600;color:#3D0D1E">'+(s.topic||'Interview')+'<div style="font-size:11px;color:#993556;margin-top:2px">'+s.date+'</div></div><div style="font-size:20px;font-weight:700;color:'+((s.score||0)>=8?'#1D9E75':(s.score||0)>=6?'#C43060':'#E8A020')+'">'+(s.score||0)+'/10</div></div>';}).join('')));}

function startQ(type) {
  stype=type;qnum=0;
  document.getElementById('sv').classList.add('hide');
  document.getElementById('qv').classList.remove('hide');
  document.getElementById('fba').classList.add('hide');
  document.getElementById('aw').classList.add('hide');
  if(type==='dilemma')ab('dilemma');
  if(type==='rapid')ab('rapid');
  loadQ();
}

var TOPICS=['friendship','faith','leadership','conflict','character','family','mistakes','social issues','honesty','courage'];
var usedTopics=[];

async function loadQ() {
  document.getElementById('fba').classList.add('hide');
  document.getElementById('aw').classList.add('hide');
  qnum++;
  document.getElementById('qprog').textContent='Question '+qnum;
  document.getElementById('qarea').innerHTML='<div class="ld"><div class="d"></div><div class="d"></div><div class="d"></div><span>Getting your question...</span></div>';

  var topic=TOPICS[Math.floor(Math.random()*TOPICS.length)];
  var timeLimit=stype==='rapid'?90:300;
  var typeNote=stype==='dilemma'?'Make it a moral dilemma with no clearly right answer.':stype==='rapid'?'Make it short and direct.':'Make it thoughtful and challenging.';

  var sys='You are a private-school interview coach for Grade 6 student Summer applying to Langley Christian School. Generate ONE interview question about '+topic+'. '+typeNote+' Return ONLY a JSON object with these exact fields: {"topic":"'+topic+'","question":"the question text","hint":"one thinking hint","followup":"one follow-up question","stoic_quote":"a short Marcus Aurelius quote","stoic_meaning":"what it means for an 11 year old"}. Keep all text SHORT. No apostrophes in values.';

  try {
    var raw=await api(sys,'Generate one interview question now.');
    var obj=JSON.parse(raw);
    currentQ=obj;
    var h='<div class="qbox"><span class="qtag">'+obj.topic+'</span><p class="qtxt" style="margin-top:8px">'+obj.question+'</p>'+(obj.hint?'<p class="qhint"><i class="ti ti-bulb" style="color:#E8527A"></i> Think about: '+obj.hint+'</p>':'')+'</div>';
    if(obj.stoic_quote){h+='<div class="stoic"><div style="font-size:11px;font-weight:700;color:#7A1A3A;margin-bottom:6px"><i class="ti ti-flame"></i> Marcus Aurelius</div><p class="sq">'+obj.stoic_quote+'</p><p class="se">'+obj.stoic_meaning+'</p></div>';}
    if(obj.followup){h+='<div class="fu"><strong style="color:#E8527A">They might ask:</strong> '+obj.followup+'</div>';}
    document.getElementById('qarea').innerHTML=h;
    document.getElementById('aw').classList.remove('hide');
    document.getElementById('ain').value='';
    startClock(timeLimit);
  } catch(e) {
    document.getElementById('qarea').innerHTML='<div style="color:#993556;padding:1rem">Could not load question. <button class="btn2" onclick="loadQ()">Try again</button></div>';
  }
}

function startClock(s){cs=s;cr=true;ud();if(ci)clearInterval(ci);ci=setInterval(tc,1000);document.getElementById('pbtn').innerHTML='<i class="ti ti-player-pause"></i>';}
function tc(){if(!cr)return;cs--;if(cs<=0){cs=0;clearInterval(ci);cr=false;document.getElementById('clbl').textContent='Time is up!';}ud();}
function ud(){var m=Math.floor(cs/60),s=cs%60;var el=document.getElementById('cnum');el.textContent=m+':'+(s<10?'0':'')+s;el.className='clk-num'+(cs<30?' danger':cs<90?' warn':'');}
function pause(){cr=!cr;document.getElementById('pbtn').innerHTML=cr?'<i class="ti ti-player-pause"></i>':'<i class="ti ti-player-play"></i>';}
function nextQ(){if(ci)clearInterval(ci);loadQ();}

async function submitAns() {
  var a=document.getElementById('ain').value.trim();
  if(!a){alert('Write something first!');return;}
  if(ci)clearInterval(ci);cr=false;
  document.getElementById('aw').classList.add('hide');
  var fb=document.getElementById('fba');fb.classList.remove('hide');
  fb.innerHTML='<div class="ld"><div class="d"></div><div class="d"></div><div class="d"></div><span>Reading your answer...</span></div>';

  var sys='You are an honest interview coach for Grade 6 girl Summer. Score strictly. 9-10 impressive depth; 7-8 good; 5-6 surface; 3-4 generic. Return ONLY a JSON object with these exact fields: {"overall":7,"stars":3,"thought":7,"clarity":7,"honesty":7,"courage":7,"worked":"what worked well","deeper":"what could go deeper","nudge":"one follow-up question","stronger":"a stronger version in child voice","cheer":"one encouraging sentence"}. Keep all text SHORT. No apostrophes in values.';
  var usr='Question: '+currentQ.question+' Answer: '+a;

  try {
    var raw=await api(sys,usr);
    var d=JSON.parse(raw);
    var se=d.stars||2;
    as(se);cnt++;
    if(cnt===1)ab('first');
    if(cnt>=5)ab('five');
    if(cnt>=10)ab('ten');
    if((d.honesty||0)>=8)ab('honest');
    if((d.overall||0)>=9)ab('deep');
    hist.push({topic:currentQ.topic,score:d.overall||0,date:new Date().toLocaleDateString()});
    save();uh();
    var ov=d.overall||0,c2=ov>=8?'#1D9E75':ov>=6?'#C43060':'#E8A020';
    var h='<div class="anim"><div class="pop-box"><div class="pop-stars">'+Array(se).fill('\u2605').join(' ')+'</div><div class="pop-title">+'+se+' stars!</div><div class="pop-msg">'+(d.cheer||'Keep going!')+'</div></div>';
    h+='<div style="text-align:center;padding:.75rem 0 .5rem"><div style="font-size:36px;font-weight:700;color:'+c2+'">'+ov+'<span style="font-size:16px;color:#993556">/10</span></div></div>';
    h+='<div class="sbars">';
    var si=[['Thought',d.thought],['Clarity',d.clarity],['Honesty',d.honesty],['Courage',d.courage]];
    for(var x=0;x<si.length;x++){var vv=si[x][1]||0;h+='<div class="sb"><div class="sb-l">'+si[x][0]+'</div><div class="sb-v">'+vv+'/10</div><div class="sb-t"><div class="sb-f" style="width:'+(vv*10)+'%;background:'+(vv>=8?'#1D9E75':'#E8527A')+'"></div></div></div>';}
    h+='</div><hr>';
    if(d.worked)h+='<div class="fb g"><div class="fb-l">What worked</div><div class="fb-t">'+d.worked+'</div></div>';
    if(d.deeper)h+='<div class="fb w"><div class="fb-l">Could go deeper</div><div class="fb-t">'+d.deeper+'</div></div>';
    if(d.nudge)h+='<div class="fb p"><div class="fb-l">Think about this</div><div class="fb-t">'+d.nudge+'</div></div>';
    if(d.stronger)h+='<div class="fb"><div class="fb-l">A stronger version</div><div class="fb-t" style="font-style:italic">'+d.stronger+'</div></div>';
    h+='<div style="margin-top:12px" class="row"><button class="btn f1" onclick="nextQ()"><i class="ti ti-arrow-right"></i> Next question</button><button class="btn2" onclick="endSession()">Finish</button></div></div>';
    fb.innerHTML=h;
  } catch(e) {
    fb.innerHTML='<div style="color:#993556;padding:1rem">Error: '+e.message+'<br><button class="btn2" style="margin-top:8px" onclick="submitAns()">Try again</button></div>';
    document.getElementById('aw').classList.remove('hide');
  }
}

function endSession(){
  if(ci)clearInterval(ci);
  document.getElementById('qv').classList.add('hide');
  document.getElementById('sv').classList.remove('hide');
}
</script>
</body>
</html>
